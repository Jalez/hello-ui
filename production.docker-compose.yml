version: '3'

services:
  db:
    image: postgres:latest
    container_name: ui-designer.db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ui_designer
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    networks:
      - ui-designer-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_DRAWBOARD_URL: https://tie-lukioplus.rd.tuni.fi/drawboard
    container_name: ui-designer.app
    image: ui-designer-app:latest
    ports:
      - "54322:3000"
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ui_designer
      DB_CLIENT: postgres
      NEXT_PUBLIC_BASE_PATH: /css-artist
      TZ: Europe/Helsinki
      NODE_ENV: production
    depends_on:
      - db
    restart: always
    networks:
      - ui-designer-net

  ws-server:
    build:
      context: ./ws-server
      dockerfile: Dockerfile
    container_name: ui-designer.ws
    image: ui-designer-ws:latest
    ports:
      - "54323:8080"
    environment:
      PORT: 8080
      CORS_ORIGIN: https://tie-lukioplus.rd.tuni.fi
      TZ: Europe/Helsinki
    restart: always
    networks:
      - ui-designer-net

volumes:
  pgdata:

networks:
  ui-designer-net:
