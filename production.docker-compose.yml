services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - hello-ui-net

  db:
    image: postgres:16-alpine
    container_name: hello-ui.db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hello_ui
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hello_ui"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - hello-ui-net

  db-init:
    build:
      context: .
      dockerfile: Dockerfile.db-init
    container_name: hello-ui.db-init
    image: hello-ui-db-init:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hello_ui
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - hello-ui-net

  drawboard:
    build:
      context: ./drawBoard
      dockerfile: Dockerfile
    container_name: hello-ui.drawboard
    image: hello-ui-drawboard:latest
    ports:
      - "54320:3500"
    environment:
      TZ: Europe/Helsinki
      NODE_ENV: production
    restart: always
    networks:
      - hello-ui-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_DRAWBOARD_URL: ${NEXT_PUBLIC_DRAWBOARD_URL:-http://localhost:3500}
        NEXT_PUBLIC_WEBSOCKET_URL: ${NEXT_PUBLIC_WEBSOCKET_URL:-ws://localhost:3100}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    container_name: hello-ui.app
    image: hello-ui-app:latest
    ports:
      - "54322:3000"
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hello_ui
      DB_CLIENT: postgres
      TZ: Europe/Helsinki
      NODE_ENV: production
      WS_SERVICE_TOKEN: ${WS_SERVICE_TOKEN:-ws-service-secret}
      ADMIN_EMAIL: "raitsu11@gmail.com"
    depends_on:
      db-init:
        condition: service_completed_successfully
      drawboard:
        condition: service_started
      redis:
        condition: service_healthy
    restart: always
    networks:
      - hello-ui-net

  ws-server:
    build:
      context: ./ws-server
      dockerfile: Dockerfile
    container_name: hello-ui.ws
    image: hello-ui-ws:latest
    ports:
      - "54323:8080"
    env_file:
      - .env.production
    environment:
      PORT: 8080
      API_BASE_URL: http://app:3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hello_ui
      CORS_ORIGIN: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      TZ: Europe/Helsinki
      NODE_ENV: production
      WS_SERVICE_TOKEN: ${WS_SERVICE_TOKEN:-ws-service-secret}
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - hello-ui-net

volumes:
  pgdata:

networks:
  hello-ui-net:
    driver: bridge
