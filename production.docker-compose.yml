version: '3'

services:
  db:
    image: postgres:latest
    container_name: ui-designer.db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ui_designer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ui_designer"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - ui-designer-net

  drawboard:
    build:
      context: ./drawBoard
      dockerfile: Dockerfile
    container_name: ui-designer.drawboard
    image: ui-designer-drawboard:latest
    ports:
      - "54320:3500"
    environment:
      TZ: Europe/Helsinki
      NODE_ENV: production
    restart: always
    networks:
      - ui-designer-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: https://tie-lukioplus.rd.tuni.fi/css-artist
        NEXT_PUBLIC_DRAWBOARD_URL: https://tie-lukioplus.rd.tuni.fi/drawboard
        NEXT_PUBLIC_WEBSOCKET_URL: wss://tie-lukioplus.rd.tuni.fi/css-artist-ws
        NEXT_PUBLIC_BASE_PATH: /css-artist
    container_name: ui-designer.app
    image: ui-designer-app:latest
    ports:
      - "54322:3000"
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ui_designer
      DB_CLIENT: postgres
      TZ: Europe/Helsinki
      NODE_ENV: production
      WS_SERVICE_TOKEN: ${WS_SERVICE_TOKEN:-ws-service-secret}
      NEXT_PUBLIC_APP_URL: "https://tie-lukioplus.rd.tuni.fi/css-artist"
      NEXT_PUBLIC_BASE_PATH: "/css-artist"
      NEXT_PUBLIC_DRAWBOARD_URL: "https://tie-lukioplus.rd.tuni.fi/drawboard"
      NEXT_PUBLIC_WEBSOCKET_URL: "wss://tie-lukioplus.rd.tuni.fi/css-artist-ws"
      COLLAB_ENGINE: "${COLLAB_ENGINE:-yjs}"
      NEXT_PUBLIC_COLLAB_ENGINE: "${NEXT_PUBLIC_COLLAB_ENGINE:-yjs}"
      # Server-only: LTI redirect base (not inlined at build time, so prod always uses this)
      APP_ROOT_URL: "https://tie-lukioplus.rd.tuni.fi/css-artist"
      # Admin: grant sidebar admin link to this email (e.g. when DB admin_roles not seeded). Match is case-insensitive.
      ADMIN_EMAIL: "raitsu11@gmail.com"
      # Optional: set to "true" to log [DEBUG] to console and write debug-*.jsonl to ./logs
      # DEBUG_LOGS: "true"
    depends_on:
      - db
    restart: always
    networks:
      - ui-designer-net

  ws-server:
    build:
      context: ./ws-server
      dockerfile: Dockerfile
    container_name: ui-designer.ws
    image: ui-designer-ws:latest
    ports:
      - "54323:8080"
    env_file:
      - .env.production
    environment:
      PORT: 8080
      API_BASE_URL: http://app:3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ui_designer
      CORS_ORIGIN: https://tie-lukioplus.rd.tuni.fi
      TZ: Europe/Helsinki
      NODE_ENV: production
      WS_SERVICE_TOKEN: ${WS_SERVICE_TOKEN:-ws-service-secret}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ui-designer-net

volumes:
  pgdata:

networks:
  ui-designer-net:
    driver: bridge
