<!-- This is an example of how to use the iframe to get the points from the CSS Artist exercise -->

<form enctype="multipart/form-data" method="post" id="css-artist">
  {% csrf_token %}

  <iframe name="ui-designer" src="http://localhost:5173/" width="100%" height="800px" style="min-width: 500px;"
    id="ui-designer" allow="clipboard-read; clipboard-write"></iframe>
  <input type="hidden" name="data" id="data" value="" />
  <button id="submit" class="btn btn-primary">Submit to Grader</button>
</form>

<script>
  const setWeek = function (week) {
    //Send a message to the iframe
    document.querySelector('#ui-designer').contentWindow.postMessage({ message: "setWeek", week: week }, '*');
  }

  window.addEventListener('message', receiveMessage, false);
  function receiveMessage(event) {
    console.log("received message", event.data)
    if (event.data.message === "loaded") {
      console.log("")
      setWeek("html_2_es"); //_es (exercise session), _vh (viikkoharkka), _ex (tentti)
    }
    if (event.data.message === "s") {
      console.log("received points", event.data.d)
      //Decode the base64 data
      const data = atob(event.data.d);
      document.querySelector('#data').value = event.data;
    }


  }


</script>
